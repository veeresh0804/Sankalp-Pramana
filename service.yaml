apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ai-3d-backend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Scale to zero when idle (cost efficient for hackathon)
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        # Use the fastest CPU allocation
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 120
      containers:
        - image: gcr.io/ai-3d-visualizer/ai-3d-backend
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 2Gi
              cpu: "2"
          env:
            - name: GCS_BUCKET_NAME
              value: "ai-3d-models-bucket"
            - name: GCS_PROJECT_ID
              value: "ai-3d-visualizer"
            - name: RETRIEVAL_SOURCES
              value: "sketchfab,polyhaven,mock"
            - name: TOP_K_CANDIDATES
              value: "10"
            - name: MIN_CONFIDENCE
              value: "0.3"
            - name: CACHE_TTL
              value: "3600"
            # API Keys
            - name: SKETCHFAB_API_TOKEN
              value: "07e3ec9c1c5943968b4ad234bccb595a"
            - name: GEMINI_API_KEY
              value: "AIzaSyBJVFU15MZwUteCAGZuo6ICfqzaVwsWJHU"
